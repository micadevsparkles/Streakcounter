<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guerreiro - Libertação</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0a0a0a; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .glass-panel { background: rgba(25, 25, 25, 0.95); backdrop-filter: blur(10px); border: 1px solid #333; }
    .btn-primary { background: #ffffff; color: #000000; font-weight: bold; transition: all 0.2s ease; }
    .btn-primary:hover { background: #e0e0e0; transform: scale(0.98); }
    .btn-outline { border: 1px solid #ffffff; color: #ffffff; transition: all 0.2s ease; }
    .btn-outline:hover { background: #ffffff; color: #000000; }
    .btn-danger { border: 1px solid #ef4444; color: #ef4444; transition: all 0.2s ease; }
    .btn-danger:hover { background: #ef4444; color: #ffffff; }
    .input-field { background: #1a1a1a; border: 1px solid #333; color: white; width: 100%; padding: 12px; border-radius: 8px; outline: none; transition: border 0.3s; }
    .input-field:focus { border-color: #fff; }
    .loader { border: 3px solid #333; border-top: 3px solid #fff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- ==================== ADAPTER API ==================== -->
<!-- ==================== ADAPTER API AJUSTADA PARA GITHUB ==================== -->
  <script>
    // COLE A URL QUE VOCÊ COPIOU NA IMPLANTAÇÃO DO GOOGLE AQUI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbG_CK1wziu-1fE0JfRvmBhX3E_LMB6LnwslDJuX7xMyT4NGaqpVnBBp0nxMeZSwk7PQ/exec"; 

    const api = {
      call: async (funcName, ...args) => {
        try {
          // No GitHub, usamos fetch para enviar os dados para o Google Apps Script
          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
              function: funcName,
              args: args
            })
          });
          const data = await response.json();
          return data;
        } catch (error) {
          console.error("Erro na conexão:", error);
          return { success: false, message: "Erro de conexão com o servidor." };
        }
      }
    };
  </script>

  <div id="app" class="w-full max-w-md relative">
    
    <!-- 1. TELA DE LOGIN -->
    <div id="login-view" class="w-full">
      <div class="text-center mb-10">
        <h1 class="text-4xl font-bold tracking-widest uppercase text-white mb-2">Libertação</h1>
        <p class="text-gray-400 text-sm">O primeiro passo é decidir parar.</p>
      </div>

      <div class="glass-panel p-6 rounded-2xl shadow-2xl">
        <div id="login-error" class="hidden bg-red-900/50 border border-red-500 text-red-200 p-3 rounded-lg text-sm mb-4 text-center"></div>
        
        <div class="space-y-4">
          <input type="text" id="login-user" placeholder="Usuário" class="input-field" autocomplete="off">
          <input type="password" id="login-pass" placeholder="Senha" class="input-field">
          
          <button onclick="handleLogin()" id="btn-login" class="btn-primary w-full py-3 rounded-lg mt-2 flex justify-center items-center">
            <span id="login-text">ENTRAR</span>
            <span id="login-loader" class="loader hidden"></span>
          </button>
        </div>

        <div class="mt-6 flex justify-between text-sm text-gray-400">
          <button onclick="openModal('modal-create')" class="hover:text-white transition">Criar uma conta</button>
          <button onclick="openModal('modal-forgot')" class="hover:text-white transition">Esqueci a senha</button>
        </div>
      </div>
    </div>

    <!-- 2. DASHBOARD -->
    <div id="dashboard-view" class="hidden w-full pb-10">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-bold text-gray-200">Bem-vindo, <span id="dash-user" class="text-white">guerreiro</span>!</h2>
        <div class="relative cursor-pointer" onclick="openModal('modal-notif')">
          <svg class="w-7 h-7 text-gray-300 hover:text-white transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
          <span id="notif-badge" class="hidden absolute top-0 right-0 bg-red-500 border border-black w-3 h-3 rounded-full"></span>
        </div>
      </div>

      <div class="flex flex-col items-center justify-center bg-zinc-900/50 p-8 rounded-3xl border border-zinc-800 shadow-xl relative overflow-hidden mb-6">
        <div class="relative flex items-center justify-center w-32 h-32 mb-4">
          <svg class="w-28 h-28 text-white opacity-20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.5 12.5c0 2.5-1.5 4.5-4 5.5.5-1.5 0-3-1.5-4.5-1.5 1.5-2 3.5-1.5 5.5-3-1.5-3.5-3.5-3.5-5.5 0-2.5 2-4 3.5-6 1.5-2 1-4.5 1-4.5s1.5 1 2.5 3c1 2 2.5 3 2.5 5.5z"/></svg>
          <div class="absolute flex flex-col items-center mt-3">
            <span id="dash-days" class="text-4xl font-black text-white leading-none">0</span>
            <span class="text-[10px] uppercase font-bold tracking-widest text-gray-400 mt-1">Limpo</span>
          </div>
        </div>
        <div class="text-center z-10">
          <p class="text-gray-400 text-xs tracking-widest uppercase mb-1">Tempo Total</p>
          <div id="dash-clock" class="text-2xl font-mono font-medium tracking-tight text-white">00:00:00</div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-8">
        <button onclick="confirmRelapse()" class="btn-danger w-full py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-sm">EU RECAÍ</button>
        <button onclick="openModal('modal-metas')" class="btn-outline w-full py-3 rounded-xl font-bold text-sm bg-zinc-900/50">METAS</button>
      </div>

      <div class="glass-panel rounded-2xl p-5 mb-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-sm uppercase tracking-wider text-gray-300" id="calendar-month">Mês</h3>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center text-xs text-gray-500 mb-2">
          <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>
        <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center"></div>
      </div>
      
      <button onclick="logout()" class="w-full text-center text-gray-600 text-sm hover:text-white transition">Sair da conta</button>
    </div>
  </div>

  <!-- MODAIS -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-40 hidden" onclick="closeModals()"></div>

  <!-- Modal Criar Conta -->
  <div id="modal-create" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-sm glass-panel p-6 rounded-2xl z-50 hidden">
    <h2 class="text-xl font-bold mb-4">Criar Conta</h2>
    <div id="create-msg" class="hidden p-2 text-sm text-center rounded mb-3"></div>
    <div class="space-y-3">
      <input type="text" id="reg-user" placeholder="Nome de Usuário" class="input-field">
      <input type="email" id="reg-email" placeholder="E-mail" class="input-field">
      <input type="password" id="reg-pass" placeholder="Senha" class="input-field">
      <button onclick="handleCreateAccount()" id="btn-reg" class="btn-primary w-full py-3 rounded-lg flex justify-center items-center">
        <span id="create-text">REGISTRAR</span>
        <span id="create-loader" class="loader hidden"></span>
      </button>
    </div>
    <button onclick="closeModals()" class="mt-4 w-full text-sm text-gray-400">Cancelar</button>
  </div>

  <!-- Modal Esqueci Senha -->
  <div id="modal-forgot" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-sm glass-panel p-6 rounded-2xl z-50 hidden">
    <h2 class="text-xl font-bold mb-4">Recuperar</h2>
    <div id="forgot-msg" class="hidden p-2 text-sm text-center rounded mb-3"></div>
    <div class="space-y-3">
      <input type="text" id="forgot-user" placeholder="Usuário" class="input-field">
      <input type="email" id="forgot-email" placeholder="E-mail" class="input-field">
      <input type="password" id="forgot-pass" placeholder="Nova Senha" class="input-field">
      <button onclick="handleResetPassword()" id="btn-forgot" class="btn-primary w-full py-3 rounded-lg flex justify-center items-center">
        <span id="forgot-text">ALTERAR</span>
        <span id="forgot-loader" class="loader hidden"></span>
      </button>
    </div>
  </div>

  <!-- Modal Metas e Notif (Estrutura simplificada para funcionamento) -->
  <div id="modal-metas" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-sm glass-panel p-6 rounded-2xl z-50 hidden flex flex-col">
    <h2 class="text-xl font-bold mb-4">Metas</h2>
    <div id="metas-list" class="space-y-2 overflow-y-auto max-h-60"></div>
    <button onclick="closeModals()" class="mt-4 text-gray-400">Fechar</button>
  </div>

  <div id="modal-notif" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-sm glass-panel p-6 rounded-2xl z-50 hidden flex flex-col">
    <h2 class="text-xl font-bold mb-4">Notificações</h2>
    <div id="notif-list" class="space-y-2 overflow-y-auto max-h-60"></div>
    <button onclick="closeModals()" class="mt-4 text-gray-400">Fechar</button>
  </div>

  <script>
    let currentUser = null;
    let streakDate = null;
    let clockInterval = null;
    let diasX = [];
    let diasCheck = [];
    let notificacoes = [];

    const metasAlvos = [
      { dias: 1, label: "1 Dia" }, { dias: 7, label: "1 Semana" }, { dias: 30, label: "1 Mês" },
      { dias: 90, label: "90 Dias" }, { dias: 365, label: "1 Ano" }
    ];

    function openModal(id) {
      document.getElementById('modal-overlay').classList.remove('hidden');
      document.getElementById(id).classList.remove('hidden');
    }
    
    function closeModals() {
      document.getElementById('modal-overlay').classList.add('hidden');
      ['modal-create', 'modal-forgot', 'modal-metas', 'modal-notif'].forEach(id => document.getElementById(id).classList.add('hidden'));
    }

    function showMsg(id, text, isError = true) {
      const el = document.getElementById(id);
      if(!el) return;
      el.textContent = text;
      el.className = isError ? "p-2 text-sm text-center rounded mb-3 bg-red-900/50 text-red-200 border border-red-500 block" : "p-2 text-sm text-center rounded mb-3 bg-green-900/50 text-green-200 border border-green-500 block";
      el.classList.remove('hidden');
    }

    function toggleLoader(action, show) {
      // action: 'login', 'create', 'forgot'
      const text = document.getElementById(action + '-text');
      const loader = document.getElementById(action + '-loader');
      if (show) { text.classList.add('hidden'); loader.classList.remove('hidden'); }
      else { text.classList.remove('hidden'); loader.classList.add('hidden'); }
    }

    async function handleLogin() {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value.trim();
      if(!user || !pass) return showMsg('login-error', 'Preencha os campos.');

      toggleLoader('login', true);
      try {
        const res = await api.call('verifyLogin', user, pass);
        if (res.success) {
          currentUser = res;
          streakDate = new Date(res.streak);
          diasX = JSON.parse(res.diasX || "[]");
          diasCheck = JSON.parse(res.diasCheck || "[]");
          notificacoes = JSON.parse(res.notificacoes || "[]");
          initDashboard();
          api.call('syncCheckDays', user);
        } else {
          showMsg('login-error', res.message);
        }
      } catch (e) { showMsg('login-error', 'Erro no servidor.'); }
      toggleLoader('login', false);
    }

    async function handleCreateAccount() {
      const user = document.getElementById('reg-user').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass = document.getElementById('reg-pass').value.trim();
      
      toggleLoader('create', true);
      const res = await api.call('createAccount', {usuario: user, email: email, senha: pass});
      toggleLoader('create', false);

      if(res.success) {
        showMsg('create-msg', 'Sucesso! Entre agora.', false);
        setTimeout(closeModals, 1500);
      } else { showMsg('create-msg', res.message); }
    }

    async function handleResetPassword() {
      const user = document.getElementById('forgot-user').value.trim();
      const email = document.getElementById('forgot-email').value.trim();
      const pass = document.getElementById('forgot-pass').value.trim();

      toggleLoader('forgot', true);
      const res = await api.call('resetPassword', user, email, pass);
      toggleLoader('forgot', false);

      if(res.success) {
        showMsg('forgot-msg', 'Senha alterada!', false);
        setTimeout(closeModals, 1500);
      } else { showMsg('forgot-msg', res.message); }
    }

    function initDashboard() {
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('dashboard-view').classList.remove('hidden');
      document.getElementById('dash-user').textContent = currentUser.usuario;
      if(notificacoes.length > 0) document.getElementById('notif-badge').classList.remove('hidden');
      renderCalendar();
      updateMetasUI();
      renderNotifications();
      if(clockInterval) clearInterval(clockInterval);
      updateClock();
      clockInterval = setInterval(updateClock, 1000);
    }

    function updateClock() {
      if(!streakDate) return;
      const diffMs = new Date() - streakDate;
      const d = Math.floor(diffMs / 86400000);
      const h = Math.floor((diffMs / 3600000) % 24);
      const m = Math.floor((diffMs / 60000) % 60);
      const s = Math.floor((diffMs / 1000) % 60);
      document.getElementById('dash-days').textContent = d;
      document.getElementById('dash-clock').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    async function confirmRelapse() {
      if(!confirm("Zerar progresso?")) return;
      const res = await api.call('registerRelapse', currentUser.usuario);
      if(res.success) {
        streakDate = new Date(res.streak);
        diasX = JSON.parse(res.diasX || "[]");
        notificacoes = JSON.parse(res.notificacoes || "[]");
        initDashboard();
      }
    }

    function renderCalendar() {
      const now = new Date();
      const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';
      for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
      for(let i=1; i<=daysInMonth; i++) {
        const d = document.createElement('div');
        const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
        d.className = "w-full aspect-square flex items-center justify-center text-xs rounded " + (diasX.includes(dateStr) ? "bg-red-900/50 text-red-500" : "bg-zinc-800 text-gray-400");
        d.textContent = i;
        grid.appendChild(d);
      }
    }

    function updateMetasUI() {
      const diff = Math.floor((new Date() - streakDate) / 86400000);
      const list = document.getElementById('metas-list');
      list.innerHTML = metasAlvos.map(m => `<div class="p-2 border border-zinc-800 rounded ${diff >= m.dias ? 'text-green-500' : 'text-zinc-600'}">${m.label}</div>`).join('');
    }

    function renderNotifications() {
      const list = document.getElementById('notif-list');
      list.innerHTML = notificacoes.map(n => `<div class="p-2 bg-zinc-900 text-xs border-b border-zinc-800">${n.msg}</div>`).join('');
    }

    function logout() { location.reload(); }
  </script>
</body>
</html>
